# Triage incoming PRs to enforce Mesa contribution requirements.
#
# Checks (in order):
#   1. Bug exemption  — PRs labelled 'bug' or with bug/hotfix titles skip
#                       the issue-linkage and assignment checks, but still
#                       go through the template check.
#   2. Linked issue   — PR body/title must reference an issue with one of
#                       the standard GitHub closing keywords.
#   3. Author assigned— The PR author must be assigned to at least one of
#                       the referenced issues.
#   4. Template check — The description must contain the required section
#                       headings from the Mesa PR template.
#
# This workflow intentionally has NO write permissions.
# It only evaluates the PR and saves results to an artifact.
# pr-triage-comment.yml picks up the artifact and posts comments/labels,
# following the same safe two-workflow pattern used by benchmarks.yml.

name: PR Triage

on:
  pull_request:
    types: [opened, reopened, edited, labeled]

permissions:
  contents: read

jobs:
  triage:
    name: Check PR requirements
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate PR requirements
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const pr       = context.payload.pull_request;
            const prNumber = pr.number;
            const prAuthor = pr.user.login;
            const prTitle  = pr.title  || '';
            const prBody   = pr.body   || '';
            const prLabels = pr.labels.map(l => l.name);
            const { owner, repo } = context.repo;
            const guideUrl = `https://github.com/${owner}/${repo}/blob/main/CONTRIBUTING.md`;

            const result = {
              prNumber,
              prAuthor,
              passed: true,
              skipAll: false,
              isBugFix: false,
              comment: '',
              addWarningLabel: false,
              removeWarningLabel: false,
            };

            // ── Maintainer override ───────────────────────────────────────
            if (prLabels.includes('review-ready')) {
              result.skipAll = true;
              result.removeWarningLabel = true;
              fs.writeFileSync('triage_result.json', JSON.stringify(result));
              return;
            }

            // ── 1. Bug exemption ──────────────────────────────────────────
            const BUG_TITLE_RE = /^(bug|fix|hotfix|revert)\b/i;
            result.isBugFix =
              prLabels.includes('bug') ||
              prLabels.includes('hotfix') ||
              BUG_TITLE_RE.test(prTitle.trim());

            console.log(`PR #${prNumber} | author: ${prAuthor} | bug-exempt: ${result.isBugFix}`);

            // ── 2. Linked issue check ─────────────────────────────────────
            const ISSUE_RE  = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?):?\s*#(\d+)/gi;
            const allText   = `${prTitle}\n${prBody}`;
            const issueNums = [...new Set(
              [...allText.matchAll(ISSUE_RE)].map(m => parseInt(m[1], 10))
            )];

            console.log(`  Linked issues: ${issueNums.length > 0 ? issueNums.join(', ') : 'none'}`);

            if (!result.isBugFix && issueNums.length === 0) {
              result.passed          = false;
              result.addWarningLabel = true;
              result.comment = [
                '## ⚠️ PR Requirements Not Met',
                '',
                `Thank you for your contribution, @${prAuthor}!`,
                '',
                'This PR is **not linked to an existing issue**. Mesa requires all non-bug-fix PRs to be backed by a discussion or issue so that scope and approach can be agreed on before code is written.',
                '',
                '**What to do:**',
                '1. Open a new issue (or find an existing one) describing the problem this PR solves.',
                '2. Assign yourself to that issue.',
                '3. Edit this PR description to include `Fixes #<issue-number>`.',
                '',
                'This PR has been **automatically closed**. You can re-open it once the requirements are met.',
                '',
                `> See the [contributing guide](${guideUrl}) for details.`,
              ].join('\n');
              fs.writeFileSync('triage_result.json', JSON.stringify(result));
              core.setFailed('No linked issue found');
              return;
            }

            // ── 3. Author assignment check ────────────────────────────────
            if (!result.isBugFix) {
              let assignedIssue      = null;
              const unassignedIssues = [];

              for (const num of issueNums) {
                try {
                  const { data: issue } = await github.rest.issues.get({
                    owner, repo, issue_number: num
                  });
                  const assignees = (issue.assignees || []).map(a => a.login);
                  if (assignees.includes(prAuthor)) {
                    assignedIssue = num;
                    break;
                  }
                  unassignedIssues.push({ number: num, assignees });
                } catch (_) {
                  console.log(`  Issue #${num} not found or cross-repo — skipping`);
                }
              }

              if (!assignedIssue) {
                const issueList = unassignedIssues
                  .map(i => `#${i.number} (assigned to: ${i.assignees.length ? i.assignees.join(', ') : '_nobody_'})`)
                  .join('\n- ');

                result.passed          = false;
                result.addWarningLabel = true;
                result.comment = [
                  '## ⚠️ PR Requirements Not Met',
                  '',
                  `Thank you for your contribution, @${prAuthor}!`,
                  '',
                  'You are **not assigned** to any of the linked issues:',
                  `- ${issueList}`,
                  '',
                  'Mesa tracks intent via issue assignment to avoid duplicated effort and ensure someone is accountable for the work.',
                  '',
                  '**What to do:**',
                  '1. Go to the linked issue and assign yourself.',
                  '2. If the issue is already assigned to someone else, coordinate with them or open a new issue.',
                  '',
                  'This PR has been **automatically closed**. You can re-open it once the requirements are met.',
                  '',
                  `> See the [contributing guide](${guideUrl}) for details.`,
                ].join('\n');
                fs.writeFileSync('triage_result.json', JSON.stringify(result));
                core.setFailed(`@${prAuthor} is not assigned to any linked issue`);
                return;
              }

              result.assignedIssue = assignedIssue;
            }

            // ── 4. Description template check ─────────────────────────────
            const REQUIRED_SECTIONS = [
              { heading: /##\s+Summary/i,                  label: '**Summary** — describe _what_ this PR changes' },
              { heading: /##\s+(Motivation|Why|Reason)/i,  label: '**Motivation / Why** — explain _why_ this change is needed' },
              { heading: /##\s+(How.*test|Testing)/i,      label: '**How did you test this?** — describe your testing approach' },
              { heading: /##\s+(Audience|Use.?case)/i,     label: '**Audience / Use cases** — who benefits from this change?' },
            ];

            const missingSections = [];
            for (const section of REQUIRED_SECTIONS) {
              const headingMatch = section.heading.exec(prBody);
              if (!headingMatch) { missingSections.push(section.label); continue; }
              const afterHeading = prBody.slice(headingMatch.index + headingMatch[0].length);
              const nextHeading  = afterHeading.search(/\n##\s/);
              const sectionBody  = (nextHeading === -1 ? afterHeading : afterHeading.slice(0, nextHeading)).trim();
              const stripped     = sectionBody.replace(/<!--[\s\S]*?-->/g, '').trim();
              if (stripped.length < 10) missingSections.push(section.label);
            }

            const hasAIDisclosure =
              /##\s+(AI|Artificial Intelligence)/i.test(prBody) ||
              /AI.*used|used.*AI|generated.*AI|AI.*generated|Claude|ChatGPT|Copilot/i.test(prBody);

            if (missingSections.length > 0) {
              const sectionList = missingSections.map(s => `- ${s}`).join('\n');
              const aiNote = !hasAIDisclosure
                ? '\n> 💡 **AI usage disclosure:** If you used an AI tool (Claude, Copilot, ChatGPT, etc.) to help write this PR, please briefly mention how in the description.'
                : '';

              result.passed          = false;
              result.addWarningLabel = true;
              result.comment = [
                '## ⚠️ PR Description Incomplete',
                '',
                `Thank you for your contribution, @${prAuthor}!`,
                '',
                'The following required sections are **missing or empty** in your PR description:',
                '',
                sectionList,
                '',
                'Please edit the PR description to include these sections. The Mesa PR template provides placeholder text for each — replace the placeholders with real content.',
                aiNote,
                '',
                'This PR has been **automatically closed**. You can re-open it once the description is completed.',
                '',
                `> See the [contributing guide](${guideUrl}) for details.`,
              ].join('\n');
              fs.writeFileSync('triage_result.json', JSON.stringify(result));
              core.setFailed(`PR description missing required sections: ${missingSections.join(', ')}`);
              return;
            }

            // ── All checks passed ✅ ──────────────────────────────────────
            result.removeWarningLabel = true;
            result.comment = result.isBugFix
              ? '✅ Bug fix PR — issue linkage and assignment checks skipped.\nDescription template looks good. A maintainer will review shortly.'
              : `✅ All requirements met! Issue #${result.assignedIssue} is linked and @${prAuthor} is assigned.\nDescription template looks good. A maintainer will review shortly.`;

            fs.writeFileSync('triage_result.json', JSON.stringify(result));
            console.log('All PR requirements met.');

      - name: Save PR number
        if: always()
        run: echo "${{ github.event.pull_request.number }}" > pr_number.txt

      - name: Upload triage result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: triage-result
          path: |
            triage_result.json
            pr_number.txt